data:
  processed_root: "data/processed_3m"
  block_size: 3.0
  num_points: 16384
  wall_label_id: 1
  min_points_per_block: 500
  voxel_size: 0.03

model:
  input_dim: 10
  num_classes: 2

training:
  batch_size: 4
  learning_rate: 0.0005
  epochs: 20
  weight_decay: 0.0001
  wall_class_weight: 1.5
  scheduler: "cosine"
  num_workers: 0
  eval_every: 5
  save_every: 5

augmentation:
  enabled: true
  densify: false
  noise_min: 0.005
  noise_max: 0.020
  dropout_keep: 0.85
  random_rotation_z: true

inference:
  voxel_size: 0.03
  block_size: 3.0
  num_points: 16384
  overlap: 0.5
