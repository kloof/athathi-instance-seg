data:
  pointcept_root: "data/structured3d_pointcept"
  processed_root: "data/processed"
  block_size: 1.0
  num_points: 4096
  wall_label_id: 1
  min_points_per_block: 100
  voxel_size: 0.03

model:
  input_dim: 6
  num_classes: 2

training:
  batch_size: 16
  learning_rate: 0.001
  epochs: 100
  weight_decay: 0.0001
  wall_class_weight: 3.0
  scheduler: "cosine"
  num_workers: 0
  eval_every: 5
  save_every: 10

augmentation:
  enabled: true
  jitter_std: 0.002
  dropout_keep: 0.85
  random_rotation_z: true

export:
  onnx_path: "checkpoints/pointnet_wall.onnx"
  quantized_path: "checkpoints/pointnet_wall_int8.onnx"

inference:
  voxel_size: 0.03
  block_size: 1.0
  num_points: 4096
