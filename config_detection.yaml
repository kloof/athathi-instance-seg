data:
  processed_root: "s3d_data/detection"
  max_boxes: 64  # unused now, kept for compat

model:
  input_dim: 10
  num_classes: 16    # 15 named + "other"
  backbone_K: 16

training:
  batch_size: 2
  epochs: 100
  learning_rate: 0.0003
  weight_decay: 0.0001
  offset_weight: 1.0
  max_points: 400000
  eval_every: 5
  save_every: 5
  num_workers: 0

augmentation:
  enabled: true
  densify: false
  densify_multiplier: 10
